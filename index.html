<!DOCTYPE html>
<html lang="en">
<head>

<title>Braves Ticket Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0C2340;
    --red: #CE1141;
    --gold: #EAAA00;
    --cream: #F5F0E8;
    --dark: #080F1A;
    --card: #111B2B;
    --border: rgba(234,170,0,0.15);
    --text-muted: rgba(245,240,232,0.45);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(206,17,65,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(12,35,64,0.8) 0%, transparent 50%);
  }

  header {
    padding: 24px 24px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
  }

  .logo-mark {
    width: 42px;
    height: 42px;
    background: var(--red);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    flex-shrink: 0;
    box-shadow: 0 4px 20px rgba(206,17,65,0.4);
  }

  .header-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--cream);
    line-height: 1;
  }

  .header-text p {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    margin-top: 3px;
  }

  .container {
    padding: 24px;
    max-width: 780px;
    margin: 0 auto;
  }

  .game-selector { margin-bottom: 24px; }

  .game-selector label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .game-select-wrapper { position: relative; }

  select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--cream);
    padding: 14px 44px 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    border-radius: 10px;
    appearance: none;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus { border-color: rgba(234,170,0,0.4); }

  .select-arrow {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    pointer-events: none;
    font-size: 12px;
  }

  .stats-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .stats-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
  }

  .view-toggle {
    display: flex;
    gap: 4px;
  }

  .toggle-btn {
    padding: 4px 12px;
    border-radius: 14px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .toggle-btn:hover { color: var(--cream); }

  .toggle-btn.active-tickets {
    background: rgba(12,35,64,0.8);
    border-color: var(--gold);
    color: var(--gold);
  }

  .toggle-btn.active-parking {
    background: rgba(12,35,64,0.8);
    border-color: #378ADD;
    color: #378ADD;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }

  .stat-card .stat-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 5px;
  }

  .stat-card .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 1px;
    line-height: 1;
  }

  .stat-card.highlight .stat-value { color: var(--gold); }
  .stat-card.low .stat-value { color: #4ade80; }
  .stat-card.high .stat-value { color: var(--red); }

  .section-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .tab {
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    transition: all 0.2s;
  }

  .tab:hover { color: var(--cream); border-color: rgba(245,240,232,0.3); }

  .tab.active {
    background: var(--navy);
    border-color: var(--gold);
    color: var(--gold);
  }

  .listing-count {
    font-size: 12px;
    color: var(--text-muted);
  }

  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    padding: 12px 16px;
    text-align: left;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  thead th:hover { color: var(--gold); }
  thead th.sorted { color: var(--gold); }
  thead th:last-child { text-align: right; }

  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.04); }

  tbody td { padding: 14px 16px; font-size: 14px; }

  .section-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 24px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .sec-13 { background: rgba(234,170,0,0.12); color: #e8c84a; border: 1px solid rgba(234,170,0,0.3); }
  .sec-14 { background: rgba(12,35,64,0.8); color: #7aa3cc; border: 1px solid rgba(122,163,204,0.3); }
  .sec-15 { background: rgba(206,17,65,0.15); color: #f06080; border: 1px solid rgba(206,17,65,0.3); }

  .row-label { color: var(--text-muted); font-size: 13px; }

  .price-neutral { color: var(--text-secondary); }
  .price-cell {
    text-align: right;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.5px;
  }

  .price-top { color: var(--red); }
  .price-mid { color: var(--cream); }
  .price-low { color: #4ade80; }

  .price-per {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    margin-left: 2px;
    letter-spacing: 0;
  }

  .last-updated {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 16px;
    padding-bottom: 8px;
  }

  .pulse {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #4ade80;
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s infinite;
    vertical-align: middle;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .empty-state {
    padding: 48px 24px;
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
  }

  .error-banner {
    background: rgba(206,17,65,0.1);
    border: 1px solid rgba(206,17,65,0.3);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 20px;
    font-size: 13px;
    color: #f06080;
    display: none;
  }

  .loading-state {
    padding: 48px 24px;
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
  }

  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 10px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 520px) {
    header { padding: 16px; }
    .container { padding: 16px; }
    .stats-row { grid-template-columns: repeat(3,1fr); gap: 8px; }
    .stat-card { padding: 10px 12px; }
    .stat-card .stat-value { font-size: 22px; }
    tbody td { padding: 12px 12px; font-size: 13px; }
    thead th { padding: 10px 12px; }
  }
</style>

<body>

<header>
  <div class="logo-mark">ATL</div>
  <div class="header-text">
    <h1>Ticket Tracker</h1>
    <p>SECTIONS 13 · 14 · 15 &nbsp;·&nbsp; TRUIST PARK</p>
  </div>
</header>

<div class="container">

  <div class="error-banner" id="errorBanner"></div>

  <div class="game-selector">
    <label>Select Game</label>
    <div class="game-select-wrapper">
      <select id="gameSelect" onchange="loadGame()">
        <option value="">Loading games...</option>
      </select>
      <span class="select-arrow">▼</span>
    </div>
  </div>

  <div class="stats-header">
    <span class="stats-label">Stats</span>
    <div class="view-toggle">
      <button class="toggle-btn active-tickets" id="toggleTickets" onclick="setView('tickets')">Tickets</button>
      <button class="toggle-btn" id="toggleParking" onclick="setView('parking')">Parking</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card low">
      <div class="stat-label" id="labelLow">Lowest</div>
      <div class="stat-value" id="statLow">—</div>
    </div>
    <div class="stat-card highlight">
      <div class="stat-label" id="labelAvg">Avg Price</div>
      <div class="stat-value" id="statAvg">—</div>
    </div>
    <div class="stat-card high">
      <div class="stat-label" id="labelHigh">Highest</div>
      <div class="stat-value" id="statHigh">—</div>
    </div>
  </div>

  <div class="section-tabs" id="sectionTabs">
    <button class="tab active" onclick="filterSection('all', this)">All Sections</button>
    <button class="tab" onclick="filterSection('13', this)">Section 13</button>
    <button class="tab" onclick="filterSection('14', this)">Section 14</button>
    <button class="tab" onclick="filterSection('15', this)">Section 15</button>
  </div>

  <div class="listing-count-row">
    <span class="listing-count" id="listingCount"><span class="pulse"></span>— listings</span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('section')" id="th-section">Section</th>
          <th onclick="sortBy('row')" id="th-row">Row</th>
          <th onclick="sortBy('price')" id="th-price" class="sorted">Price (Incl. Fees) ↓</th>
          <th>Est. Before Fees</th>
        </tr>
      </thead>
      <tbody id="ticketBody">
        <tr><td colspan="3" class="loading-state"><span class="spinner"></span>Loading listings...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="last-updated" id="lastUpdated">Fetching data...</div>

</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────
let allData = null;        // full parsed data.json
let currentGameId = null;  // currently selected game key
let currentSection = 'all';
let currentSort = 'price';
let sortDir = -1;          // -1 = descending (highest first)
let viewMode = 'tickets';  // 'tickets' or 'parking'

// ─── Boot ─────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  loadData();
});

// ─── Load data.json ───────────────────────────────────────────────────────
async function loadData() {
  // Use injected data first (works when opening index.html directly)
  if (window.INJECTED_DATA) {
    allData = window.INJECTED_DATA;
    populateGameSelector();
    hideError();
    return;
  }
  try {
    const res = await fetch('data.json?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allData = await res.json();
    populateGameSelector();
    hideError();
  } catch (err) {
    showError(
      'Could not load data.json. Make sure the scraper has been run at least once and data.json is in the same folder as this file. ' +
      '(<code>node scraper.js</code>)'
    );
    document.getElementById('ticketBody').innerHTML =
      `<tr><td colspan="3" class="empty-state">No data available — run the scraper first.</td></tr>`;
    document.getElementById('lastUpdated').textContent = 'No data loaded';
  }
}


// ─── Populate game dropdown ───────────────────────────────────────────────
function populateGameSelector() {
  if (!allData || !allData.games) return;

  const sel = document.getElementById('gameSelect');
  sel.innerHTML = '';

  const gameIds = Object.keys(allData.games);
  if (gameIds.length === 0) {
    sel.innerHTML = '<option value="">No games found in data.json</option>';
    return;
  }

  gameIds.forEach(id => {
    const game = allData.games[id];
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = game.label || `Game ${id}`;
    sel.appendChild(opt);
  });

  // Default to first game
  currentGameId = gameIds[0];
  sel.value = currentGameId;
  renderTable();
  updateStats();
  updateLastUpdated();
}

// ─── Game select change ───────────────────────────────────────────────────
function loadGame() {
  currentGameId = document.getElementById('gameSelect').value;
  renderTable();
  updateStats();
}

// ─── View toggle (Tickets / Parking) ─────────────────────────────────────
function setView(mode) {
  viewMode = mode;

  const ticketsBtn = document.getElementById('toggleTickets');
  const parkingBtn = document.getElementById('toggleParking');
  const sectionTabs = document.getElementById('sectionTabs');

  ticketsBtn.classList.remove('active-tickets', 'active-parking');
  parkingBtn.classList.remove('active-tickets', 'active-parking');

  if (mode === 'parking') {
    parkingBtn.classList.add('active-parking');
    sectionTabs.style.display = 'none';
  } else {
    ticketsBtn.classList.add('active-tickets');
    sectionTabs.style.display = '';
  }

  renderTable();
  updateStats();
}

// ─── Section filter ───────────────────────────────────────────────────────
function filterSection(sec, el) {
  currentSection = sec;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

// ─── Column sort ──────────────────────────────────────────────────────────
function sortBy(col) {
  if (currentSort === col) {
    sortDir *= -1;
  } else {
    currentSort = col;
    sortDir = col === 'price' ? -1 : 1;
  }
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sorted');
    // Strip sort arrows
    th.textContent = th.textContent.replace(/ [↑↓]$/, '');
  });
  const th = document.getElementById('th-' + col);
  th.classList.add('sorted');
  th.textContent += sortDir === -1 ? ' ↓' : ' ↑';
  renderTable();
}

// ─── Render table ─────────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('ticketBody');
  const countEl = document.getElementById('listingCount');

  if (!allData || !currentGameId || !allData.games[currentGameId]) {
    tbody.innerHTML = `<tr><td colspan="4" class="empty-state">No data available</td></tr>`;
    return;
  }

  const game = allData.games[currentGameId];

  if (viewMode === 'parking') {
    const parkingListings = game.parkingListings || [];
    countEl.innerHTML = `<span class="pulse"></span>${parkingListings.length} parking listing${parkingListings.length !== 1 ? 's' : ''}`;

    if (parkingListings.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4" class="empty-state">No parking listings found</td></tr>`;
      return;
    }

    const sorted = [...parkingListings].sort((a, b) => (a.price - b.price) * sortDir);
    const prices = sorted.map(l => l.price);
    const maxP = Math.max(...prices);
    const minP = Math.min(...prices);
    const range = maxP - minP;
    const highThresh = minP + range * 0.66;
    const midThresh  = minP + range * 0.33;

    tbody.innerHTML = sorted.map(l => {
      const cls = l.price >= highThresh ? 'price-top' : l.price >= midThresh ? 'price-mid' : 'price-low';
      return `<tr>
        <td><span class="section-badge" style="background:rgba(55,138,221,0.12);color:#7ab8f5;border:1px solid rgba(55,138,221,0.3);width:auto;padding:0 8px;">Lot ${l.lot}</span></td>
        <td><span class="row-label">Parking Pass</span></td>
        <td class="price-cell" colspan="2"><span class="${cls}">$${l.price.toFixed(0)}</span><span class="price-per">/pass</span></td>
      </tr>`;
    }).join('');
    return;
  }

  // Tickets view
  let data = [...game.listings];

  // Section filter
  if (currentSection !== 'all') {
    data = data.filter(t => String(t.section) === currentSection);
  }

  // Sort
  data.sort((a, b) => {
    if (currentSort === 'price') return (a.price - b.price) * sortDir;
    if (currentSort === 'section') return String(a.section).localeCompare(String(b.section)) * sortDir;
    if (currentSort === 'row') return String(a.row).localeCompare(String(b.row)) * sortDir;
    return 0;
  });

  // Listing count
  countEl.innerHTML = `<span class="pulse"></span>${data.length} listing${data.length !== 1 ? 's' : ''}`;

  if (data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4" class="empty-state">No listings found in this section</td></tr>`;
    return;
  }

  // Price tier thresholds for color coding
  const prices = data.map(t => t.price);
  const maxP = Math.max(...prices);
  const minP = Math.min(...prices);
  const range = maxP - minP;
  const highThresh = minP + range * 0.66;
  const midThresh  = minP + range * 0.33;

  tbody.innerHTML = data.map(t => {
    const cls = t.price >= highThresh ? 'price-top' : t.price >= midThresh ? 'price-mid' : 'price-low';
    const sec = String(t.section);
    return `<tr>
      <td><span class="section-badge sec-${sec}">${sec}</span></td>
      <td><span class="row-label">Row ${t.row}</span></td>
      <td class="price-cell"><span class="${cls}">$${t.price.toFixed(0)}</span><span class="price-per">/ea</span></td>
      <td class="price-cell"><span class="price-neutral">$${Math.round(t.price * 0.70).toFixed(0)}</span><span class="price-per">/ea</span></td>
    </tr>`;
  }).join('');
}

// ─── Stats row ────────────────────────────────────────────────────────────
function updateStats() {
  if (!allData || !currentGameId || !allData.games[currentGameId]) return;

  const game = allData.games[currentGameId];

  if (viewMode === 'parking') {
    const parkingListings = game.parkingListings || [];
    const prices = parkingListings.map(l => l.price);

    document.getElementById('labelLow').textContent  = 'P. Lowest';
    document.getElementById('labelAvg').textContent  = 'P. Average';
    document.getElementById('labelHigh').textContent = 'P. Highest';

    if (prices.length > 0) {
      const low  = Math.min(...prices);
      const high = Math.max(...prices);
      const avg  = Math.round(prices.reduce((a, b) => a + b, 0) / prices.length);
      document.getElementById('statLow').textContent  = '$' + low;
      document.getElementById('statAvg').textContent  = '$' + avg;
      document.getElementById('statHigh').textContent = '$' + high;
    } else if (game.parkingPrice) {
      // Fallback for older data without parkingListings
      document.getElementById('statLow').textContent  = '$' + game.parkingPrice;
      document.getElementById('statAvg').textContent  = '—';
      document.getElementById('statHigh').textContent = '—';
    } else {
      document.getElementById('statLow').textContent  = '—';
      document.getElementById('statAvg').textContent  = '—';
      document.getElementById('statHigh').textContent = '—';
    }
    return;
  }

  // Tickets view
  document.getElementById('labelLow').textContent  = 'Lowest';
  document.getElementById('labelAvg').textContent  = 'Avg Price';
  document.getElementById('labelHigh').textContent = 'Highest';

  const listings = game.listings;
  if (!listings || listings.length === 0) {
    document.getElementById('statLow').textContent  = '—';
    document.getElementById('statAvg').textContent  = '—';
    document.getElementById('statHigh').textContent = '—';
    return;
  }

  const prices = listings.map(t => t.price);
  const low  = Math.min(...prices);
  const high = Math.max(...prices);
  const avg  = Math.round(prices.reduce((a, b) => a + b, 0) / prices.length);

  document.getElementById('statLow').textContent  = '$' + low;
  document.getElementById('statAvg').textContent  = '$' + avg;
  document.getElementById('statHigh').textContent = '$' + high;
}

// ─── Last updated ─────────────────────────────────────────────────────────
function updateLastUpdated() {
  if (!allData || !allData.lastUpdated) return;
  const d = new Date(allData.lastUpdated);
  const formatted = d.toLocaleString('en-US', {
    month: 'short', day: 'numeric',
    hour: 'numeric', minute: '2-digit', hour12: true
  });
  document.getElementById('lastUpdated').textContent = 'Last updated: ' + formatted;
}

// ─── Error display ────────────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.innerHTML = '⚠️ ' + msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorBanner').style.display = 'none';
}
</script>
